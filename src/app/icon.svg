<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2d52"/>
      <stop offset="100%" stop-color="#091f36"/>
    </radialGradient>

    <!-- Purple inner glow -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3d2080" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#091f36" stop-opacity="0"/>
    </radialGradient>

    <!-- Neon cyan glow for S-curve -->
    <filter id="sGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"  result="b1"/>
      <feGaussianBlur stdDeviation="18" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot glow -->
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Purple center glow -->
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="url(#purpleGlow)"/>

  <!-- Outer diamond -->
  <polygon
    points="256,18 494,256 256,494 18,256"
    fill="none"
    stroke="#7B68C8"
    stroke-width="4"
    stroke-opacity="0.55"
  />

  <!-- Inner diamond -->
  <polygon
    points="256,90 422,256 256,422 90,256"
    fill="none"
    stroke="#7B68C8"
    stroke-width="3"
    stroke-opacity="0.42"
  />

  <!-- Horizontal grid lines inside inner diamond -->
  <line x1="173" y1="173" x2="339" y2="173" stroke="#8BB4D8" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="131" y1="215" x2="381" y2="215" stroke="#8BB4D8" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="90"  y1="256" x2="422" y2="256" stroke="#8BB4D8" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="131" y1="297" x2="381" y2="297" stroke="#8BB4D8" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="173" y1="339" x2="339" y2="339" stroke="#8BB4D8" stroke-opacity="0.18" stroke-width="2"/>

  <!-- S-curve — glow layer -->
  <path
    d="M 256,90 C 418,90 418,256 256,256 C 94,256 94,422 256,422"
    stroke="#00ccee"
    stroke-width="24"
    stroke-linecap="round"
    fill="none"
    filter="url(#sGlow)"
    opacity="0.92"
  />

  <!-- S-curve — bright core -->
  <path
    d="M 256,90 C 418,90 418,256 256,256 C 94,256 94,422 256,422"
    stroke="#b8f4ff"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Orange anchor dots -->
  <circle cx="256" cy="90"  r="16" fill="#E07840" filter="url(#dotGlow)"/>
  <circle cx="256" cy="256" r="13" fill="#E07840" filter="url(#dotGlow)"/>
  <circle cx="256" cy="422" r="16" fill="#E07840" filter="url(#dotGlow)"/>
</svg>
