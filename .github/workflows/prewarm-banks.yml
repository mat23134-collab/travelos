name: Pre-warm booking banks

# On-demand pre-fill of the "book ahead" banks (restaurant_recommendations +
# attraction_recommendations) so cities load instantly instead of scouting on
# demand. Runs in CI (no load on the web app). Safe to re-run — already-warm
# cities are skipped unless `force` is set.

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'City or comma-list (blank = the script default list)'
        required: false
      only:
        description: 'What to scout'
        type: choice
        options: [both, restaurants, attractions]
        default: both
      limit:
        description: 'Max cities to process'
        required: false
      force:
        description: 'Re-scout even if a city is already warm'
        type: boolean
        default: false

concurrency:
  group: prewarm-banks
  cancel-in-progress: false

jobs:
  prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      EXA_API_KEY:               ${{ secrets.EXA_API_KEY }}
      TAVILY_API_KEY:            ${{ secrets.TAVILY_API_KEY }}
      GOOGLE_PLACES_API_KEY:     ${{ secrets.GOOGLE_PLACES_API_KEY }}
      YOUTUBE_API_KEY:           ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Pre-warm banks
        run: |
          set -uo pipefail
          ARGS="--only ${{ github.event.inputs.only || 'both' }}"
          [ -n "${{ github.event.inputs.city }}" ]  && ARGS="$ARGS --city \"${{ github.event.inputs.city }}\""
          [ -n "${{ github.event.inputs.limit }}" ] && ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          [ "${{ github.event.inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          echo "Running: npx tsx scripts/prewarm-banks.ts $ARGS"
          eval "npx tsx scripts/prewarm-banks.ts $ARGS"
